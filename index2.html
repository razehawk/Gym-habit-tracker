<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consistency Gym</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<style>
body{font-family:Arial;background:#080b10;color:white;text-align:center}
#calendar{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:4px}
.day{width:14px;height:14px;background:#1e293b;border-radius:3px}
.level-1{background:#14532d}
.level-2{background:#166534}
.level-3{background:#22c55e}
.level-4{background:#4ade80}
</style>
</head>
<body>

<h1>Consistency Gym</h1>

<div id="status">Not started</div>
<button onclick="startWorkout()" id="startBtn">Start</button>
<button onclick="completeWorkout()" id="completeBtn" style="display:none">Complete</button>

<div id="score"></div>
<div id="calendar"></div>

<script>
let data = JSON.parse(localStorage.getItem("gymData")) || {};
let today = new Date().toISOString().split("T")[0];

function startWorkout(){
  document.getElementById("status").innerText="In progress";
  document.getElementById("completeBtn").style.display="block";
  document.getElementById("startBtn").style.display="none";
}

function completeWorkout(){
  data[today]=true;
  localStorage.setItem("gymData",JSON.stringify(data));
  updateUI();
}

function getLast7Days(){
  let days=[];
  for(let i=6;i>=0;i--){
    let d=new Date();
    d.setDate(d.getDate()-i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}

function updateUI(){
  let last7=getLast7Days();
  let count=last7.filter(d=>data[d]).length;
  document.getElementById("score").innerText=count+"/7";

  if(data[today]){
    document.getElementById("startBtn").style.display="none";
    document.getElementById("completeBtn").style.display="none";
    document.getElementById("status").innerText="Done";
  }

  renderCalendar();
}

function renderCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";
  for(let i=27;i>=0;i--){
    let d=new Date();
    d.setDate(d.getDate()-i);
    let day=d.toISOString().split("T")[0];
    let div=document.createElement("div");
    div.classList.add("day");

    if(data[day]){
      let streak=0;
      for(let j=0;j<4;j++){
        let x=new Date(day);
        x.setDate(x.getDate()-j);
        let key=x.toISOString().split("T")[0];
        if(data[key]) streak++; else break;
      }
      let level=1;
      if(streak>=2) level=2;
      if(streak>=3) level=3;
      if(streak>=4) level=4;
      div.classList.add("level-"+level);
    }

    cal.appendChild(div);
  }
}

updateUI();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
